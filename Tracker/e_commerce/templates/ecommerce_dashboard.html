<!-- e_commerce/templates/ecommerce_dashboard.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Dashboard</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6f9;
            color: #1a2639;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
        }

        .header h1 span {
            color: #ffb347;
        }

        .header .merchant {
            background: #0b2b4a;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
        }

        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #e9eff5;
        }

        .stat-card .label {
            font-size: 13px;
            color: #6b7b8e;
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #0b2b4a;
        }

        .stat-card .icon {
            float: right;
            font-size: 24px;
            color: #0b2b4a;
            opacity: 0.3;
        }

        /* Two Column Layout */
        .two-col {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e9eff5;
        }

        .card h3 {
            font-size: 15px;
            margin-bottom: 15px;
            color: #0b2b4a;
        }

        /* Activity Feed */
        .activity-item {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f5fb;
            font-size: 13px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-item .time {
            color: #8a9aa8;
            min-width: 60px;
        }

        .activity-item .status {
            font-weight: 600;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 40px;
        }

        .status.success { background: #eafaf1; color: #1e8449; }
        .status.pending { background: #fef9e7; color: #b7950b; }
        .status.failed { background: #fdedec; color: #922b21; }
        .status.transit { background: #ebf5fb; color: #1a5276; }

        /* Shipments Table */
        .table-wrap {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e9eff5;
            overflow-x: auto;
        }

        .table-wrap h3 {
            font-size: 15px;
            margin-bottom: 15px;
            color: #0b2b4a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 10px 8px;
            color: #6b7b8e;
            font-weight: 600;
            border-bottom: 2px solid #e9eff5;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #f0f5fb;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge.delivered { background: #eafaf1; color: #1e8449; }
        .badge.transit { background: #fef9e7; color: #b7950b; }
        .badge.pending { background: #ebf5fb; color: #1a5276; }
        .badge.failed { background: #fdedec; color: #922b21; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 30px;
            color: #8a9aa8;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-msg {
            background: #fdedec;
            color: #922b21;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 10px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr 1fr;
            }
            .two-col {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
            body { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ===== HEADER ===== -->
    <div class="header">
        <h1>📦 Ship<span>Xpress</span></h1>
        <div class="merchant">
            <i class="fas fa-store"></i> Nykaa Logistics
        </div>
    </div>

    <!-- ===== STATS ===== -->
    <div class="stats" id="statsContainer">
        <div class="stat-card">
            <div class="icon"><i class="fas fa-shipping-fast"></i></div>
            <div class="label">Total Shipments</div>
            <div class="value" id="totalShipments">-</div>
        </div>
        <div class="stat-card">
            <div class="icon"><i class="fas fa-check-circle" style="color:#27ae60;"></i></div>
            <div class="label">Delivered</div>
            <div class="value" id="deliveredCount">-</div>
        </div>
        <div class="stat-card">
            <div class="icon"><i class="fas fa-truck"></i></div>
            <div class="label">In Transit</div>
            <div class="value" id="inTransitCount">-</div>
        </div>
        <div class="stat-card">
            <div class="icon"><i class="fas fa-exclamation-circle" style="color:#e74c3c;"></i></div>
            <div class="label">Pending / Failed</div>
            <div class="value" id="pendingCount">-</div>
        </div>
    </div>

    <!-- ===== TWO COLUMN ===== -->
    <div class="two-col">
        <!-- Activity Feed -->
        <div class="card">
            <h3><i class="fas fa-bolt" style="color:#ffb347;"></i> Recent Activity</h3>
            <div id="activityContainer">
                <div class="loading"><i class="fas fa-spinner"></i> Loading...</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="card">
            <h3><i class="fas fa-rocket" style="color:#0b2b4a;"></i> Quick Actions</h3>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button onclick="alert('Create Shipment form will open here')" style="padding:12px;background:#0b2b4a;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;">
                    <i class="fas fa-plus"></i> Create Shipment
                </button>
                <button onclick="alert('Track Shipment page will open')" style="padding:12px;background:#f0f5fb;color:#0b2b4a;border:none;border-radius:8px;cursor:pointer;font-weight:600;">
                    <i class="fas fa-search"></i> Track Shipment
                </button>
                <button onclick="alert('API Key generator will open')" style="padding:12px;background:#fef9e7;color:#b7950b;border:none;border-radius:8px;cursor:pointer;font-weight:600;">
                    <i class="fas fa-key"></i> Generate API Key
                </button>
            </div>
        </div>
    </div>

    <!-- ===== SHIPMENTS TABLE ===== -->
    <div class="table-wrap">
        <h3><i class="fas fa-list" style="color:#0b2b4a;"></i> Recent Shipments</h3>
        <div id="shipmentsContainer">
            <div class="loading"><i class="fas fa-spinner"></i> Loading shipments...</div>
        </div>
    </div>

</div>

<!-- ===== JAVASCRIPT ===== -->
<script>
    // =============================================
    // CONFIGURATION
    // =============================================
    const API_BASE = 'http://127.0.0.1:3000/api';
    const MERCHANT_ID = 1; // Nykaa's merchant ID

    // =============================================
    // FETCH HELPER
    // =============================================
    async function fetchAPI(endpoint) {
        try {
            const response = await fetch(`${API_BASE}/${endpoint}`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            return null;
        }
    }

    // =============================================
    // LOAD STATS
    // =============================================
    async function loadStats() {
        const stats = await fetchAPI(`stats/?merchant_id=${MERCHANT_ID}`);

        if (stats) {
            document.getElementById('totalShipments').textContent = stats.total_shipments || 0;
            document.getElementById('deliveredCount').textContent = stats.delivered || 0;
            document.getElementById('inTransitCount').textContent = stats.in_transit || 0;

            const pending = (stats.pending || 0) + (stats.failed || 0);
            document.getElementById('pendingCount').textContent = pending;
        }
    }

    // =============================================
    // LOAD ACTIVITY
    // =============================================
    async function loadActivity() {
        const dashboard = await fetchAPI(`dashboard/?merchant_id=${MERCHANT_ID}`);
        const container = document.getElementById('activityContainer');

        if (dashboard && dashboard.recent_activity && dashboard.recent_activity.length > 0) {
            const activities = dashboard.recent_activity.slice(0, 5);
            container.innerHTML = activities.map(item => {
                const statusClass = getStatusClass(item.status);
                return `
                    <div class="activity-item">
                        <span class="time">${formatTime(item.created_at)}</span>
                        <span><strong>${item.awb_number}</strong> ${item.status}</span>
                        <span class="status ${statusClass}">${item.status}</span>
                    </div>
                `;
            }).join('');
        } else {
            container.innerHTML = '<div class="loading">No recent activity</div>';
        }
    }

    // =============================================
    // LOAD SHIPMENTS
    // =============================================
    async function loadShipments() {
        const shipments = await fetchAPI(`shipments/?merchant_id=${MERCHANT_ID}`);
        const container = document.getElementById('shipmentsContainer');

        if (shipments && shipments.length > 0) {
            const recent = shipments.slice(0, 8);
            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>AWB</th>
                            <th>Receiver</th>
                            <th>City</th>
                            <th>Weight</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${recent.map(s => `
                            <tr>
                                <td><strong>${s.awb_number}</strong></td>
                                <td>${s.receiver_name}</td>
                                <td>${s.receiver_city}</td>
                                <td>${s.weight} kg</td>
                                <td><span class="badge ${getStatusBadge(s.status)}">${s.status_display || s.status}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } else {
            container.innerHTML = '<div class="loading">No shipments found</div>';
        }
    }

    // =============================================
    // HELPER FUNCTIONS
    // =============================================
    function getStatusClass(status) {
        const map = {
            'delivered': 'success',
            'out_for_delivery': 'transit',
            'in_transit': 'transit',
            'picked_up': 'transit',
            'pending': 'pending',
            'failed': 'failed'
        };
        return map[status] || 'pending';
    }

    function getStatusBadge(status) {
        const map = {
            'delivered': 'delivered',
            'out_for_delivery': 'transit',
            'in_transit': 'transit',
            'picked_up': 'transit',
            'pending': 'pending',
            'failed': 'failed'
        };
        return map[status] || 'pending';
    }

    function formatTime(datetime) {
        if (!datetime) return '';
        const d = new Date(datetime);
        return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    // =============================================
    // LOAD EVERYTHING
    // =============================================
    async function loadDashboard() {
        await loadStats();
        await loadActivity();
        await loadShipments();
    }

    // Auto-refresh every 30 seconds
    loadDashboard();
    setInterval(loadDashboard, 30000);

    console.log('📦 E-commerce Dashboard loaded!');
    console.log(`🔗 API: ${API_BASE}`);
    console.log(`🏪 Merchant ID: ${MERCHANT_ID}`);
</script>

</body>
</html>
