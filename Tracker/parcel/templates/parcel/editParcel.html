<!DOCTYPE html>
<html>
<head>
    <title>Update Parcel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Update Parcel</h2>

    <form action="/parcel/updateParcel/{{ parcel.parcel_id }}/"
      method="POST">
    {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Tracking ID</label>
            <input type="text"
                   name="tracking_id"
                   class="form-control"
                   value="{{ parcel.tracking_id }}"
                   readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Parcel Type</label>

            <select name="parcel_type"
                    class="form-control">

                <option value="Courier"
                    {% if parcel.parcel_type == 'Courier' %}
                        selected
                    {% endif %}>
                    Courier
                </option>

                <option value="Ecommerce"
                    {% if parcel.parcel_type == 'Ecommerce' %}
                        selected
                    {% endif %}>
                    Ecommerce
                </option>

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Sender Name</label>
            <input type="text"
                   name="sender_name"
                   class="form-control"
                   value="{{ parcel.sender_name }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Sender Phone</label>
            <input type="text"
                   name="sender_phone"
                   class="form-control"
                   value="{{ parcel.sender_phone }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Receiver Name</label>
            <input type="text"
                   name="receiver_name"
                   class="form-control"
                   value="{{ parcel.receiver_name }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Receiver Phone</label>
            <input type="text"
                   name="receiver_phone"
                   class="form-control"
                   value="{{ parcel.receiver_phone }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text"
                   name="product_name"
                   class="form-control"
                   value="{{ parcel.product_name }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Weight</label>
            <input type="number"
                   step="0.01"
                   name="weight"
                   class="form-control"
                   value="{{ parcel.weight }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Current Status</label>
            <input type="text"
                   name="current_status"
                   class="form-control"
                   value="{{ parcel.current_status }}"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary">
            Update Parcel
        </button>

        <a href="/parcel/parcel-list/"
           class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

</body>
</html>
