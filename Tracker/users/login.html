<!DOCTYPE html>
<html>

<head>
    <title>User Login</title>
</head>

<body>

<h2>User Login</h2>

<form method="POST">

    {% csrf_token %}

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">

        Login

    </button>

</form>

<p style="color:red;">{{ error }}</p>

<a href="/register/">

Create Account

</a>

</body>

</html>
