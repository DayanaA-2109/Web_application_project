<!DOCTYPE html>
<html>
<head>
    <title>Update User</title>
</head>
<body>

<h2>Update User</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="name" value="{{ user.name }}"><br><br>

    <input type="email" name="email" value="{{ user.email }}"><br><br>

    <input type="password" name="password" value="{{ user.password }}"><br><br>

    <input type="text" name="phone" value="{{ user.phone }}"><br><br>

    <input type="text" name="role" value="{{ user.role }}"><br><br>

    <textarea name="address">{{ user.address }}</textarea><br><br>

    <input type="text" name="city" value="{{ user.city }}"><br><br>

    <input type="text" name="pincode" value="{{ user.pincode }}"><br><br>

    <button type="submit">Update User</button>

</form>

</body>
</html>
