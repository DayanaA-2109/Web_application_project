<!DOCTYPE html>
<html>
<head>
    <title>User List</title>
</head>
<body>

<h2>User Details</h2>

<a href="{% url 'add_user' %}">Add User</a>

<br><br>

<table border="1" cellpadding="8">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Role</th>
    <th>Address</th>
    <th>City</th>
    <th>Pincode</th>
    <th>Action</th>
</tr>

{% for user in users %}

<tr>

<td>{{ user.id }}</td>
<td>{{ user.name }}</td>
<td>{{ user.email }}</td>
<td>{{ user.phone }}</td>
<td>{{ user.role }}</td>
<td>{{ user.address }}</td>
<td>{{ user.city }}</td>
<td>{{ user.pincode }}</td>

<td>
<a href="{% url 'update_user' user.id %}">Edit</a>

|

<a href="{% url 'delete_user' user.id %}" onclick="return confirm('Delete User?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
