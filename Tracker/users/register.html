<!DOCTYPE html>
<html>

<head>
    <title>Create Account</title>
</head>

<body>

<h2>Create Account</h2>

<form method="POST">

    {% csrf_token %}

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">

        Register

    </button>

</form>

<p style="color:red;">{{ error }}</p>

<a href="/">

Already have an account?

</a>

</body>

</html>
