
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Security Gateway</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
.gateway-grid-bg {
    background-color: #f8fafc;
    background-image:
        linear-gradient(to right, rgba(148,163,184,0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(148,163,184,0.1) 1px, transparent 1px);
    background-size: 3rem 3rem;
}

/* Role selection effect */
.role-radio:checked + .role-label {
    background: #fff !important;
    color: #6366f1 !important;
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

.context-pane { display:none; }

#role-admin:checked ~ .form-body .pane-admin,
#role-user:checked ~ .form-body .pane-user,
#role-agent:checked ~ .form-body .pane-agent,
#role-merchant:checked ~ .form-body .pane-merchant {
    display:block;
}
</style>
</head>

<body class="gateway-grid-bg min-h-screen flex items-center justify-center p-4 sm:p-6">

<main class="w-full max-w-4xl">

<!-- MAIN CARD -->
<div class="bg-white/90 backdrop-blur-md rounded-2xl shadow-xl border overflow-hidden">

<!-- HEADER -->
<div class="bg-gradient-to-br from-slate-900 to-slate-800 text-white p-6 sm:p-8">
    <div class="flex items-center gap-2">
        <i class="fa-solid fa-shield-halved text-indigo-400"></i>
        <span class="text-xs font-bold tracking-widest">LOGISTICS ENGINE</span>
    </div>

    <h1 class="text-xl sm:text-2xl font-black mt-4">
        Identity Management Portal
    </h1>

    <p class="text-slate-400 text-xs mt-2">
        Secure multi-role access registration system
    </p>
</div>

<!-- FORM -->
<form class="p-5 sm:p-8 space-y-5">

<!-- ROLE -->
<div>
<label class="text-[10px] font-bold text-slate-400">Select Role</label>

<div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-2 bg-slate-100 p-2 rounded-xl">

<input type="radio" id="role-admin" name="portal_role" class="sr-only role-radio" checked>
<input type="radio" id="role-user" name="portal_role" class="sr-only role-radio">
<input type="radio" id="role-agent" name="portal_role" class="sr-only role-radio">
<input type="radio" id="role-merchant" name="portal_role" class="sr-only role-radio">

<label for="role-admin" class="role-label text-xs text-center py-2 rounded-lg cursor-pointer bg-white/60">
<i class="fa fa-user-shield"></i> Admin
</label>

<label for="role-user" class="role-label text-xs text-center py-2 rounded-lg cursor-pointer bg-white/60">
<i class="fa fa-user"></i> User
</label>

<label for="role-agent" class="role-label text-xs text-center py-2 rounded-lg cursor-pointer bg-white/60">
<i class="fa fa-route"></i> Agent
</label>

<label for="role-merchant" class="role-label text-xs text-center py-2 rounded-lg cursor-pointer bg-white/60">
<i class="fa fa-store"></i> Merchant
</label>

</div>
</div>

<!-- INPUTS -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

<div class="sm:col-span-2">
<input type="text" class="w-full p-2 border rounded-lg text-sm" placeholder="Full Name" required>
</div>

<input type="email" class="w-full p-2 border rounded-lg text-sm" placeholder="Email Address" required>
<input type="tel" class="w-full p-2 border rounded-lg text-sm" placeholder="Phone Number" required>

<div class="sm:col-span-2">
<input type="text" class="w-full p-2 border rounded-lg text-sm" placeholder="Address" required>
</div>

<div class="sm:col-span-2">
<input type="password" class="w-full p-2 border rounded-lg text-sm" placeholder="Password" required>
</div>

<div class="sm:col-span-2">
<input type="password" class="w-full p-2 border rounded-lg text-sm" placeholder="Confirm Password" required>
</div>

</div>

<!-- ROLE EXTRA FIELDS -->
<div class="form-body sm:col-span-2">

<div class="context-pane pane-agent">
<input class="w-full p-2 border rounded-lg text-sm" placeholder="Vehicle / License Plate Number">
</div>

<div class="context-pane pane-merchant">
<input class="w-full p-2 border rounded-lg text-sm" placeholder="Merchant Tax ID">
</div>

</div>

<!-- BUTTON -->
<button type="submit"
class="w-full bg-indigo-600 hover:bg-slate-900 text-white py-3 rounded-xl text-xs font-bold uppercase transition">
Register Account
</button>

<!-- FOOTER -->
<div class="flex justify-between text-[11px] text-slate-400">
<label class="flex items-center gap-2">
<input type="checkbox">
Save Profile
</label>

<a href="#" class="text-indigo-500 hover:underline">
Already have account?
</a>
</div>

</form>
</div>

</main>

</body>
</html>
