<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShipXpress Login Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px 15px;
    overflow-y:auto;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);
    font-family:'Segoe UI',sans-serif;
}

.card{
    width:100%;
    max-width:420px;
    padding:28px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,.97);
    box-shadow:0 15px 40px rgba(0,0,0,.35);
    margin:20px auto;
}

.logo{
    width:70px;
    height:70px;
    margin:auto;
    margin-bottom:15px;
    border-radius:50%;
    background:#0d6efd;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    box-shadow:0 8px 20px rgba(13,110,253,.35);
}

h2{
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:6px;
}

.subtitle{
    text-align:center;
    color:#6c757d;
    font-size:14px;
    margin-bottom:20px;
}

label{
    font-size:14px;
    font-weight:600;
    color:#374151;
    margin-bottom:5px;
}

.form-control,
.form-select{
    height:44px;
    border-radius:8px;
    font-size:14px;
}

.form-control:focus,
.form-select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 .2rem rgba(37,99,235,.20);
}

.btn-primary{
    height:46px;
    font-size:15px;
    font-weight:bold;
    border-radius:8px;
    letter-spacing:1px;
}

.footer{
    text-align:center;
    margin-top:18px;
    font-size:12px;
    color:#6c757d;
}

/* Tablet */
@media (max-width:768px){

    body{
        padding:20px;
        align-items:flex-start;
    }

    .card{
        max-width:100%;
        padding:24px;
    }

    h2{
        font-size:24px;
    }

    .logo{
        width:65px;
        height:65px;
        font-size:30px;
    }

}

/* Mobile */
@media (max-width:480px){

    body{
        padding:15px;
    }

    .card{
        padding:20px;
        border-radius:15px;
    }

    h2{
        font-size:22px;
    }

    .subtitle{
        font-size:13px;
    }

    label{
        font-size:13px;
    }

    .form-control,
    .form-select{
        height:42px;
        font-size:13px;
    }

    .btn-primary{
        height:42px;
        font-size:14px;
    }

    .footer{
        font-size:11px;
    }

}

    </style>

</head>

<body>

<div class="card">

    <div class="logo">
        🚚
    </div>

    <h2>ShipXpress</h2>

    <p class="subtitle">
        Secure Logistics & Shipment Management System
    </p>

    <form method="POST" action="{% url 'login_user' %}">

        {% csrf_token %}

        <div class="mb-3">
            <label>Full Name</label>
            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter Full Name"
                required>
        </div>

        <div class="mb-3">
            <label>Email Address</label>
            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email Address"
                required>
        </div>

        <div class="mb-3">
            <label>Phone Number</label>
            <input
                type="text"
                name="phone"
                class="form-control"
                placeholder="Enter Phone Number"
                required>
        </div>

        <div class="mb-3">
            <label>Select Role</label>

            <select class="form-select" name="role" required>

                <option value="">-- Select Role --</option>

                <option value="Admin">👨‍💼 Admin</option>

                <option value="User">👤 User</option>

                <option value="Agent">🚚 Agent</option>

                <option value="Merchant">🏪 Merchant</option>

            </select>

        </div>

        <div class="mb-4">
            <label>Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            SIGN IN
        </button>

    </form>

    <div class="footer">
        © 2026 ShipXpress Logistics Management System
    </div>

</div>

</body>
</html>
